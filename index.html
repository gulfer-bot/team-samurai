<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Samurai</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

/* 🌿 THEME */
body{
  margin:0;
  font-family:Orbitron;
  background:#f5efe6;
  color:#3e3e3e;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:#fff7ed;
  border-bottom:1px solid #e6d5c3;
}

nav h2{
  color:#c08a5b;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:50px;
  color:#c08a5b;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:40px;
}

/* CARD */
.card{
  width:250px;
  padding:20px;
  background:#fffaf4;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card:hover{
  transform:translateY(-10px);
  background:#fdebdc;
}

/* PROFILE PAGE */
.profile{
  display:none;
  text-align:center;
  padding:40px;
}

.profile img{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  background:#ddd;
}

.btn{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  background:#c08a5b;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* LINKS */
.link{
  display:block;
  margin:8px;
  color:#c08a5b;
  text-decoration:none;
}

</style>
</head>
